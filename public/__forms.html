<!doctype html>
<html>
<head><meta charset="utf-8"><title>Netlify form detection</title></head>
<body>
  <!-- File statico letto dal bot di Netlify per registrare il form (Astro + Netlify Forms) -->
  <form name="contatto" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contatto" />
    <input type="text" name="nome" />
    <input type="email" name="email" />
    <textarea name="messaggio"></textarea>
  </form>
</body>
</html>
